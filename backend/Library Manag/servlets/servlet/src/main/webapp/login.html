<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Central Library - Connexion</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#091426",
                        "background": "#f8f9ff",
                        "surface-lowest": "#ffffff",
                        "outline-variant": "#c5c6cd",
                        "on-surface-variant": "#45474c",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-primary flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-md bg-surface-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
    <div class="flex flex-col items-center text-center mb-8">
        <div class="w-12 h-12 bg-primary rounded flex items-center justify-center text-white mb-3 shadow-md">
            <span class="material-symbols-outlined text-[28px]">library_books</span>
        </div>
        <h1 class="text-2xl font-black tracking-tight text-primary">Central Library</h1>
        <p class="text-sm text-on-surface-variant mt-1">Console d'administration</p>
    </div>


    <div id="loginError" class="hidden bg-error-container text-error p-3 rounded-lg flex items-start gap-3 mb-6 border border-red-200">
        <span class="material-symbols-outlined text-[20px] pt-0.5">error</span>
        <span class="text-xs font-medium" id="errorMessage">Identifiants incorrects.</span>
    </div>

    <form id="loginForm" class="space-y-5">
        <div>
            <label for="username" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Identifiant</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">person</span>
                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="ex: marie.lefebvre"
                        class="w-full bg-background border border-outline-variant rounded-lg py-2.5 pl-10 pr-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        required
                />
            </div>
        </div>

        <div>
            <label for="password" class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Mot de passe</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        class="w-full bg-background border border-outline-variant rounded-lg py-2.5 pl-10 pr-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                        required
                />
            </div>
        </div>

        <div class="flex items-center justify-between text-xs text-on-surface-variant">
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary w-4 h-4" />
                <span>Se souvenir de moi</span>
            </label>
            <a href="#" class="hover:underline hover:text-primary transition-colors">Oublié ?</a>
        </div>

        <button
                type="submit"
                id="submitBtn"
                class="w-full bg-primary text-white py-3 rounded-lg font-semibold text-sm hover:opacity-90 transition-all flex items-center justify-center gap-2 mt-4 shadow-sm"
        >
            <span>Se connecter</span>
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>
    </form>


    <div class="mt-8 text-center">
        <p class="text-xs text-on-surface-variant">
            Pas encore de compte ?
            <a href="signup.html" class="text-primary font-bold hover:underline ml-1">S'inscrire ici</a>
        </p>
    </div>

    <p class="text-center text-[10px] text-on-surface-variant mt-8 border-t border-outline-variant pt-4 uppercase tracking-widest">
        &copy; 2026 Central Library. Admin Portal.
    </p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function handleLogin(e) {
        e.preventDefault();

        const errorBox = document.getElementById('loginError');
        const submitBtn = document.getElementById('submitBtn');

        errorBox.classList.add('hidden');
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span>Connexion...</span>`;

        const formData = new URLSearchParams(new FormData(e.target));

        try {
            const response = await fetch('api/login', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                window.location.href = "index.html";
            } else {
                errorBox.classList.remove('hidden');
            }
        } catch (error) {
            console.error("Erreur réseau :", error);
            document.getElementById('errorMessage').textContent = "Serveur injoignable.";
            errorBox.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<span>Se connecter</span><span class="material-symbols-outlined text-[18px]">arrow_forward</span>`;
        }
    });
</script>
</body>
</html>
